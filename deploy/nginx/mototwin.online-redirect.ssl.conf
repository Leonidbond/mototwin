# Include from main mototwin.conf AFTER cert exists for mototwin.online:
#   sudo certbot certonly --webroot -w /var/www/certbot -d mototwin.online
#   sudo cp deploy/nginx/mototwin.online-redirect.ssl.conf /etc/nginx/snippets/mototwin-online-redirect.conf
#   Add inside HTTPS server block in sites-enabled/mototwin OR include this file from mototwin.conf
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mototwin.online;

    ssl_certificate     /etc/letsencrypt/live/mototwin.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mototwin.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://mototwin.space$request_uri;
}
