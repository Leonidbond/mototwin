# MotoTwin — production Nginx config (MT-SEC-029).
#
# Install:
#   sudo cp deploy/nginx/mototwin.conf /etc/nginx/sites-available/mototwin
#   sudo ln -sf /etc/nginx/sites-available/mototwin /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace `mototwin.online` with your domain before installing.
# APP_ROOT must match systemd WorkingDirectory (default /opt/mototwin/app/mototwin).

# WebSocket upgrade only when client sends Upgrade — not on every proxied request.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ---------------------------------------------------------------------------
# Plain HTTP — ACME + redirect to HTTPS
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name mototwin.online;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS — production traffic
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name mototwin.online;

    # certbot --nginx fills these paths on first install:
    # ssl_certificate     /etc/letsencrypt/live/mototwin.online/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/mototwin.online/privkey.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    client_max_body_size 16m;
    client_body_timeout 30s;
    client_header_timeout 10s;

    # Next.js immutable build assets — serve from disk, NOT via Node (prevents
    # ERR_CONNECTION_RESET / pending JS chunks when proxy buffers stall).
    location /_next/static/ {
        alias /opt/mototwin/app/mototwin/.next/static/;
        access_log off;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Public files (favicon, robots, etc.)
    location /public/ {
        alias /opt/mototwin/app/mototwin/public/;
        access_log off;
        expires 7d;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header If-None-Match "";
        proxy_set_header If-Modified-Since "";

        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
        # Prevent stale HTML after deploy (old script chunk URLs in cached pages).
        proxy_hide_header ETag;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }
}
