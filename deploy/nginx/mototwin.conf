# MotoTwin — production Nginx config (MT-SEC-029).
#
# Install:
#   sudo cp deploy/nginx/mototwin.conf /etc/nginx/sites-available/mototwin
#   sudo ln -sf /etc/nginx/sites-available/mototwin /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# First-time TLS bootstrap (HTTP-only block runs until certbot fills in certs):
#   sudo certbot --nginx -d beta.mototwin.ru
# After that this file already contains the HTTPS server block — certbot will
# only patch in `ssl_certificate` / `ssl_certificate_key` paths.
#
# Replace `beta.mototwin.ru` below with your domain before installing.

# ---------------------------------------------------------------------------
# Mozilla "intermediate" TLS profile (2026-01). Regenerate from:
#   https://ssl-config.mozilla.org/#server=nginx&config=intermediate
# Lives outside server blocks so it can be reused if a second vhost appears.
# ---------------------------------------------------------------------------
ssl_protocols TLSv1.2 TLSv1.3;
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305;
ssl_prefer_server_ciphers off;
ssl_session_timeout 1d;
ssl_session_cache shared:MozSSL:10m;
ssl_session_tickets off;

# OCSP stapling — certbot --nginx fills in the trusted chain.
ssl_stapling on;
ssl_stapling_verify on;
resolver 1.1.1.1 8.8.8.8 valid=300s;
resolver_timeout 5s;

# ---------------------------------------------------------------------------
# Plain HTTP — only for ACME challenge + permanent redirect to HTTPS.
# Anything else returns 301. No proxy_pass on port 80 to keep the attack
# surface minimal (no upstream calls before TLS terminates).
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name beta.mototwin.ru;

    # Certbot renewals.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS — production traffic.
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name beta.mototwin.ru;

    # certbot --nginx will populate the two lines below. Until then nginx
    # refuses to start with a missing cert — comment out this whole server
    # block on the very first install, run certbot, then re-enable.
    # ssl_certificate     /etc/letsencrypt/live/beta.mototwin.ru/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/beta.mototwin.ru/privkey.pem;
    # ssl_trusted_certificate /etc/letsencrypt/live/beta.mototwin.ru/chain.pem;

    # ----- Security headers (edge-level; mirror docs/security/MT-SEC-006) ----
    # HSTS — 2 years + preload; emit on every response (including 4xx/5xx).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    # Click-jacking / sniffing.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    # Referrer + Permissions — duplicated from next.config.ts so error pages
    # served by Nginx itself (502/504) also carry them.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    # CSP is intentionally not set here — see MT-SEC-006 / MT-SEC-047 in
    # docs/security/findings.md (needs inline-style pass first).

    # ----- Request limits --------------------------------------------------
    # Admin import cap is 8 MB (see src/app/api/admin/imports/route.ts).
    # Buffer to 16 MB for multipart boundary + form fields. Everything else
    # uses parseJsonBody({ maxBytes }) caps from src/lib/http/parse-json-body.
    client_max_body_size 16m;
    client_body_timeout 30s;
    client_header_timeout 10s;

    # ----- Proxy to Next.js (systemd: mototwin.service on :3000) -----------
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        # WebSocket / HMR upgrade (no-op in prod, harmless).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Mid-tier timeouts — long enough for cold-start builds, short enough
        # to surface stuck upstreams instead of pinning a worker.
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Buffer the upstream response so a slow client cannot pin a worker
        # waiting for the body to drain.
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 16 8k;
    }
}
